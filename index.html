<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soluções Eficazes — Ferramentas Financeiras para o Mercado Português</title>
  <meta name="description" content="Aplicações e simuladores financeiros para mediadores de crédito, gestores de condomínios e profissionais do setor financeiro português." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /> 
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0B1F3A;
      --navy-mid: #132d52;
      --gold: #C9A84C;
      --gold-light: #e8c87a;
      --cream: #F5F0E8;
      --cream-dark: #EAE3D2;
      --text: #1a1a1a;
      --text-muted: #5a5a5a;
      --white: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
      padding: 1.2rem 4rem;
      background: rgba(11, 31, 58, 0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.2);
    }
    .nav-logo {
      justify-self: start;
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.04em;
      text-decoration: none;
    }
    .nav-logo span { color: var(--white); font-weight: 400; }
    .nav-links {
      justify-self: center;
      display: flex;
      gap: 1.6rem;
      list-style: none;
    }
    nav .nav-links a {
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #C9A84C !important;
      text-decoration: none;
      transition: color 0.2s;
    }
    nav .nav-links a:hover { color: #e8c87a !important; }
    .nav-cta { justify-self: end; }
    .nav-cta {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--navy);
      background: var(--gold);
      padding: 0.55rem 1.4rem;
      border-radius: 2px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: var(--gold-light); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      background: var(--navy);
      display: flex; align-items: center;
      position: relative;
      overflow: hidden;
      padding: 0 4rem;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 50%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
    }
    .hero-grid {
      position: absolute; inset: 0; opacity: 0.04;
      background-image:
        linear-gradient(rgba(201,168,76,1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,1) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-content {
      position: relative; z-index: 2;
      max-width: 700px;
      animation: fadeUp 0.9s ease both;
    }
    .hero-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.4);
      padding: 0.4rem 1rem;
      border-radius: 2px;
      margin-bottom: 2rem;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 5vw, 4.2rem);
      font-weight: 900;
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 1.5rem;
    }
    .hero h1 em { font-style: italic; color: var(--gold); }
    .hero p {
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1.75;
      color: rgba(255,255,255,0.65);
      max-width: 520px;
      margin-bottom: 2.5rem;
    }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-primary {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--navy);
      background: var(--gold);
      padding: 0.9rem 2rem;
      border-radius: 2px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-secondary {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      background: transparent;
      padding: 0.9rem 2rem;
      border-radius: 2px;
      border: 1px solid rgba(255,255,255,0.2);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

    /* ── SECTION COMMONS ── */
    section { padding: 7rem 4rem; }
    .section-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.8rem;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 3.5vw, 2.8rem);
      font-weight: 700;
      line-height: 1.2;
      color: var(--navy);
      margin-bottom: 1.2rem;
    }
    .section-title.light { color: var(--white); }
    .section-sub {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.8;
      color: var(--text-muted);
      max-width: 520px;
    }
